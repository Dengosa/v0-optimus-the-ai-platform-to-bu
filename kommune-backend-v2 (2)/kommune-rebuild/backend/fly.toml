# fly.toml app configuration for Kommunie backend
# Run `fly launch` first to set the app name, or edit `app` below to match.

app = "kommunie-backend"
primary_region = "jnb"  # Johannesburg — closest region to your users

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
